  <section>

          <iframe title="Highfield Rd Uniting Church" loading="lazy" referrerpolicy="no-referrer-when-downgrade"

  <script>
    // Countdown
    const weddingDate = new Date("2026-11-21T12:00:00+11:00");
    const countdownEl = document.getElementById("countdown");

    function updateCountdown() {
      const diff = weddingDate - new Date();
      if (diff <= 0) { countdownEl.textContent = "Today's the day!"; return; }
      const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);
      countdownEl.textContent = `${days} Days · ${hours} Hours · ${minutes} Minutes · ${seconds} Seconds`;
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

  <script>
    // Slideshow (randomised order)
    const slideshow = document.querySelector('.slideshow');
    const imgs = Array.from(slideshow.querySelectorAll('img'));

    for (let i = imgs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      slideshow.appendChild(imgs[j]);
      imgs.splice(i, 1, imgs.splice(j, 1, imgs[i])[0]);
    }

    let current = 0;
    imgs[current].classList.add('active');

    setInterval(() => {
      imgs[current].classList.remove('active');
      current = (current + 1) % imgs.length;
      imgs[current].classList.add('active');
    }, 6000);
  </script>

  <script>
    // Active nav
    const here = location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.nav-inner a').forEach(a => {
      if (a.getAttribute('href') === here) a.classList.add('active');
    });
  </script>
